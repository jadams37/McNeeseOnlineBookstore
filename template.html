<!-- This page serves as template for the majority of the pages
     to maintain consistency throughout the website. Add more
     elements as needed for your page's needs. -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Metadata -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="keywords" content="Marketplace, Shopping, Store, Books, Bookstore"/>
        <meta name="description" content="Online bookstore to buy textbooks and supplies."/>

        <!-- Replace 'author' with your name -->
        <meta name="author" content="author, CCS"/>

        <!-- Change 'template' with your page title -->
        <title>McNeese Bookstore: template</title>

        <!-- Styling/Script Links -->
        <link rel="stylesheet" href="css/shared.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search">
    </head>
    <body>
        <!-- Navigation Bar -->
        <header>
            <nav class="nav-head">
                <div class="nav-start">
                    <div class="logo">
                        <a class="logo-label" href="">McNeese Bookstore</a>
                    </div>
                </div>
                <div class="nav-center">
                    <form action="">
                        <div class="search">
                            <span class="search-icon material-symbols-outlined">search</span>
                            <input class="search-input" type="search" placeholder="Search">
                        </div>
                    </form>
                </div>
                <div class="nav-end">
                    <div class="cart">
                        <a href="" class="cart-label">Cart</a>
                        <a href="" class="cart-icon"><img src="icons/cart.svg"></a>
                    </div>
                    <div class="separator"></div>
                    <div class="profile">
                        <a href="" class="profile-label">Profile</a>
                        <a href="" class="profile-icon"><img src="icons/profile.svg"></a>
                    </div>
                </div>
            </nav>
        </header>
        <!-- Main content of page-->
        <article>
            Content
        </article>
        <!-- Footer containing store hours, contact information, and social media links -->
        <footer>
            <nav class="nav-foot">
                <div class="foot-start">
                    <div class="contact">
                        <a class="contact-label" href="">Contact Us</a>
                        <a class="contact-subtext" href="">Having issues with your order? Have any questions?<br>Please reach out to us if so.</a>
                    </div>
                </div>
                <div class="foot-center">
                    <a class="hours-label">Store Hours</a>
                    <a class="hours-subtext">Monday - Wednesday: 7:30 AM - 5:00 PM<br>Thursday: 7:30 AM - 6:00 PM<br>Friday: 7:30 AM - 11:30 AM</a>
                </div>
                <div class="foot-end">
                    <a class="social-label">Follow Us</a>
                    <div class="social-links">
                        <a href="https://www.facebook.com" class="social-icon"><img src="icons/facebook.png"></a>
                        <a href="https://www.instagram.com" class="social-icon"><img src="icons/instagram.png"></a>
                        <a href="https://www.tiktok.com" class="social-icon"><img src="icons/tiktok.png"></a>
                    </div>
                </div>
            </nav>
        </footer>
    </body>
</html>
